name: Go Release and Docker

on:
  workflow_dispatch:
  push:
    branches: [go-rewrite]
    tags: ['v*-go*']
  pull_request:
    branches: [go-rewrite]

concurrency:
  group: go-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sub-store

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum
      - working-directory: go-backend
        run: go test ./...

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log into GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/go-rewrite' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./go-backend
          file: ./go-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64, suffix: linux-amd64}
          - {goos: linux, goarch: arm64, suffix: linux-arm64}
          - {goos: darwin, goarch: amd64, suffix: darwin-amd64}
          - {goos: darwin, goarch: arm64, suffix: darwin-arm64}
          - {goos: windows, goarch: amd64, suffix: windows-amd64.exe}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum
      - name: Build binary
        working-directory: go-backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags='-w -s' -o sub-store-${{ matrix.suffix }} ./cmd/sub-store/
      - uses: actions/upload-artifact@v4
        with:
          name: sub-store-${{ matrix.suffix }}
          path: go-backend/sub-store-${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [docker, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: sub-store-*
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        working-directory: artifacts
        run: sha256sum sub-store-* > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: true
          make_latest: false
          files: |
            artifacts/sub-store-*
            artifacts/SHA256SUMS
