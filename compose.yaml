services:
  sub-store:
    image: ghcr.io/woyin/sub-store:2.36.5-go.7
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SUB_STORE_BACKEND_API_HOST: "0.0.0.0"
      SUB_STORE_BACKEND_API_PORT: "3000"
      SUB_STORE_DATA_BASE_PATH: "/app/data"
      SUB_STORE_BACKEND_MERGE: "true"
      SUB_STORE_BACKEND_PATH: "${SUB_STORE_BACKEND_PATH:-}"
    volumes:
      - sub-store-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  sub-store-data:
